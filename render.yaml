# Render.com Blueprint
# Deploy with: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: freshlink-pro
    env: node
    region: oregon
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    healthCheckPath: /api/health
