# Render.com Blueprint
# Deploy with: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: freshlink-pro
    env: node
    region: oregon
    plan: free
    nodeVersion: "20"
    buildCommand: npm install && cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && NODE_ENV=production node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health
